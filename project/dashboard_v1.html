<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>USAGE360 — Field Performance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2F2C3C;
    --ink-2:#454250;
    --ink-3:#716E79;
    --muted:#B2B0B6;
    --muted-2:#DEDCDE;
    --border:#B2B0B6;
    --border-soft:#E5E7EB;
    --bg:#FFFFFF;
    --bg-2:#F7F7F9;
    --bg-3:#FAFAFA;
    --bg-strip:#F4F3F3;
    --orange:#DB6C03;
    --pink:#ED39DB;
    --blue:#41AFFF;
    --blue-2:#3287C4;
    --purple:#8D38FC;
    --indigo:#686EFF;
    --green:#5AD767;
    --yellow:#FFC62B;
    --teal:#2A71A4;
    --teal-deep:#0A6E5E;
    --navy:#022D42;
    --danger:#B21111;
    --accent-approaching:#B21111;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#EDEDEF;}
  body{font-family:"Open Sans",system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input{font-family:inherit}
  .app{width:1440px;margin:0 auto;background:#fff;border:1px solid #E6E6E6}
  /* Topbar */
  .topbar{height:40px;display:flex;align-items:stretch;border-bottom:1px solid var(--border);background:#fff;position:relative}
  .topbar .brand{width:84px;background:var(--orange);color:#fff;font-weight:700;font-size:13px;letter-spacing:.02em;display:flex;align-items:center;justify-content:center}
  .topbar .crumb{display:flex;align-items:center;padding:0 14px;font-size:13px;color:var(--ink-2);gap:8px;white-space:nowrap}
  .topbar .crumb .chev{color:var(--muted)}
  .topbar .spacer{flex:1}
  .topbar .stamp{font-size:12px;color:var(--ink-3);font-style:italic;padding-right:14px;align-self:center;font-family:Inter,sans-serif}
  .topbar .tbtn{display:inline-flex;align-items:center;gap:6px;padding:0 14px;border-left:1px solid var(--border);font-size:12px;font-family:Inter,sans-serif;color:var(--ink-2);background:transparent;border-top:none;border-bottom:none;border-right:none;height:100%}
  .topbar .tbtn:hover{background:#f5f5f7}
  .topbar .tbtn.primary{background:#0A6E5E;color:#fff;border-left:none;padding:0 14px;margin:6px 0;border-radius:2px;height:28px;align-self:center;margin-right:6px}
  .topbar .tbtn.primary:hover{background:#0B7E6C}
  .topbar .tbtn svg{width:14px;height:14px}
  .topbar .avatar{width:10px;height:10px;border-radius:50%;background:var(--orange);margin:0 16px 0 8px;align-self:center}

  /* Dept strip */
  .deptstrip{display:flex;align-items:center;background:var(--bg-strip);padding:0 16px;height:80px}
  .deptstrip .title{display:flex;align-items:baseline;gap:16px;flex:1}
  .deptstrip .zfp{font-size:32px;letter-spacing:-0.02em;color:var(--navy);font-weight:400}
  .deptstrip .label{font-size:24px;letter-spacing:-0.01em;color:var(--navy);font-weight:400}
  .deptstrip .deptnav{display:flex;align-items:center}
  .deptstrip .deptnav .pill{padding:0 14px;font-size:26px;letter-spacing:-0.02em;color:var(--ink-3);cursor:pointer;user-select:none;border:none;background:transparent;height:56px;line-height:56px;position:relative}
  .deptstrip .deptnav .pill+.pill::before{content:"";position:absolute;left:0;top:12px;bottom:12px;width:1px;background:var(--border)}
  .deptstrip .deptnav .pill:hover{color:var(--ink)}
  .deptstrip .deptnav .pill.active{color:var(--navy);font-weight:400}
  .deptstrip .deptnav .pill.active::after{content:"";position:absolute;left:14px;right:14px;bottom:12px;height:2px;background:var(--orange);border-radius:2px}

  /* Overview area */
  .overview{background:var(--bg-3);padding:16px;display:grid;grid-template-columns:560px 1fr;gap:16px}
  .card{background:#fff;border:1px solid var(--border-soft);position:relative}

  /* NFR Health card */
  .nfr{padding:25px}
  .nfr .ttl{font-size:16px;color:rgba(0,0,0,.8)}
  .nfr .row{display:flex;align-items:flex-end;gap:14px;margin-top:18px}
  .nfr .big{font-size:32px;font-weight:700;letter-spacing:-0.02em;color:var(--ink);line-height:1}
  .nfr .delta{font-size:20px;color:var(--teal-deep);font-weight:600;padding-bottom:4px}
  .nfr .daterange{margin-left:auto;border:1px solid var(--muted-2);border-radius:4px;padding:8px 10px;font-size:12px;color:var(--ink-3);font-style:italic;font-family:Inter,sans-serif;min-width:155px;display:inline-flex;align-items:center;justify-content:space-between;gap:8px;background:#fff;cursor:pointer}
  .nfr .daterange svg{width:10px;height:10px;opacity:.6}
  .nfr .chart{margin-top:16px;height:190px}
  .nfr .legend{display:flex;justify-content:center;gap:24px;margin-top:8px;font-family:Inter,sans-serif;font-size:14px;color:#364153}
  .nfr .legend .dot{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:8px;vertical-align:middle}

  /* KPI + catchup */
  .right{display:flex;flex-direction:column;gap:16px}
  .kpigrid{display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:111px;gap:8px}
  .kpi{background:#fff;border:1px solid var(--border-soft);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-align:center;position:relative;transition:transform .15s,box-shadow .15s;cursor:pointer}
  .kpi:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.06)}
  .kpi .num{font-size:24px;font-weight:700;color:var(--ink);letter-spacing:-0.01em;line-height:1.1;display:inline-flex;align-items:baseline;gap:6px}
  .kpi .num .d{font-size:12px;font-weight:600}
  .kpi .name{font-weight:700;font-size:13px;color:var(--ink);margin-top:2px;white-space:nowrap}
  .kpi .sub{font-size:11px;color:var(--ink-3);font-weight:400;white-space:nowrap}
  .up{color:var(--teal-deep)}
  .down{color:var(--danger)}
  .flat{color:var(--ink-3)}
  .catchup{display:flex;flex-direction:column;gap:8px}
  .catchup h3{margin:0;font-weight:400;font-size:20px;letter-spacing:-0.01em;color:rgba(0,0,0,.8)}
  .catchup .panel{background:#fff;border:1px solid var(--border);padding:14px 18px;font-size:14px;color:rgba(0,0,0,.85);line-height:1.45}
  .catchup .panel ul{margin:0;padding:0;list-style:none}
  .catchup .panel li{padding:2px 0 2px 18px;position:relative}
  .catchup .panel li::before{content:"•";color:var(--orange);font-weight:700;font-size:18px;line-height:1;position:absolute;left:0;top:4px}
  .catchup .panel b{font-weight:700}

  /* Client data header */
  .clientarea{padding:16px;background:#fff}
  .clientarea .cd-hdr{display:flex;align-items:center;gap:10px;height:40px;margin-bottom:16px}
  .clientarea .cd-hdr h2{margin:0;font-weight:700;font-size:22px;letter-spacing:-0.01em;color:#1E1E1E;flex:1}
  .clientarea .showing{color:rgba(0,0,0,.7);font-family:Inter,sans-serif;font-style:italic;font-weight:500;font-size:15px}
  .searchbox{width:332px;height:36px;border:1px solid var(--muted);border-radius:2px;background:#fff;display:flex;align-items:center;padding:0 10px;gap:8px}
  .searchbox input{flex:1;border:none;outline:none;font-size:14px;color:var(--ink);font-family:Inter,sans-serif;background:transparent}
  .searchbox input::placeholder{color:var(--muted);font-style:italic}
  .iconbtn{width:36px;height:36px;border:1px solid var(--muted);background:#fff;display:inline-flex;align-items:center;justify-content:center;border-radius:2px;color:var(--ink-2);padding:0}
  .iconbtn:hover{background:#f5f5f7}
  .iconbtn.active{background:#E8F3FF;border-color:var(--blue-2);color:var(--blue-2)}

  /* Client row */
  .clientrow{border:1px solid var(--border);background:#fff;margin-bottom:16px;position:relative}
  .clientrow.alert{border-left:3px solid var(--danger)}
  .row-head{display:flex;align-items:center;gap:12px;padding:12px 16px}
  .row-head .logo{width:28px;height:28px;border-radius:50%;background:#fff;border:1px solid var(--border-soft);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--ink-2);overflow:hidden;flex-shrink:0}
  .row-head .name{font-size:18px;font-weight:700;color:var(--ink);letter-spacing:-0.01em;flex:1}
  .row-head .badge{background:var(--danger);color:#fff;font-size:11px;font-weight:700;letter-spacing:0.05em;border-radius:20px;padding:4px 12px;white-space:nowrap}
  .row-head .btn-more{background:#0A6E5E;color:#fff;border:none;padding:8px 14px;border-radius:2px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;font-family:Inter,sans-serif}
  .row-head .btn-more:hover{background:#0B7E6C}

  .row-body{display:grid;grid-template-columns:160px 1fr 1fr 1fr;gap:0;border-top:1px solid var(--border-soft)}
  .statsCol{display:flex;flex-direction:column;border-right:1px solid var(--border-soft)}
  .stat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 6px;border-bottom:1px solid var(--border-soft);text-align:center;gap:2px;min-height:100px}
  .stat:last-child{border-bottom:none}
  .stat .n{font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-0.01em;line-height:1.1;display:inline-flex;gap:6px;align-items:baseline;white-space:nowrap}
  .stat .n .d{font-size:11px;font-weight:600}
  .stat .l{font-size:13px;font-weight:700;color:var(--ink);line-height:1.2;white-space:nowrap}
  .stat .s{font-size:11px;color:var(--ink-3);font-weight:400;line-height:1.2;white-space:nowrap}

  .chartBox{padding:10px 16px;border-right:1px solid var(--border-soft);display:flex;flex-direction:column}
  .chartBox:last-child{border-right:none}
  .chartBox .ch-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .chartBox .ch-ttl{font-size:14px;font-weight:700;color:var(--ink)}
  .chartBox .ch-input{border:1px solid var(--muted-2);border-radius:2px;padding:5px 8px;font-size:11px;color:var(--muted);font-style:italic;font-family:Inter,sans-serif;width:120px;background:#fff;cursor:pointer}
  .chartBox .ch-input:focus{outline:none;border-color:var(--blue-2);color:var(--ink)}
  .chartBox .legend{display:flex;gap:16px;justify-content:center;font-size:11px;color:var(--ink-2);margin-top:4px;font-family:Inter,sans-serif}
  .chartBox .legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}

  .insight{padding:10px 16px;font-size:13px;color:rgba(0,0,0,.8);border-top:1px solid var(--border-soft);background:#fff}
  .insight b{font-weight:700;font-size:13px;display:block;margin-bottom:2px;color:var(--ink)}
  .insight ul{margin:0;padding-left:18px}
  .insight li{padding:1px 0}

  /* Footer */
  .footer{height:87px;background:#F7F7F9;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:32px;font-size:13px;color:var(--ink-2);font-family:Inter,sans-serif;padding:0 32px}
  .footer .sep{color:var(--muted)}
  .footer a{color:var(--teal);text-decoration:none}
  .footer a:hover{text-decoration:underline}
  .footer .status{display:inline-flex;align-items:center;gap:8px}
  .footer .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;box-shadow:0 0 0 2px rgba(90,215,103,.25)}
  .footer .copy{font-size:11px;color:var(--ink-3);margin-top:4px}
  .footercol{display:flex;flex-direction:column;align-items:center;gap:4px}

  /* Chart common */
  .tip{position:absolute;background:#fff;border:1px solid var(--border);padding:6px 10px;border-radius:4px;font-size:11px;color:var(--ink);pointer-events:none;font-family:Inter,sans-serif;box-shadow:0 4px 12px rgba(0,0,0,.08);white-space:nowrap;z-index:20}
  .tip b{font-weight:700}
  .chart-svg text{font-family:Inter,sans-serif;fill:var(--ink-3);font-size:10px}
  .chart-svg .axis-label{fill:var(--ink-2);font-size:10px;font-weight:500}

  /* Dropdown/menu */
  .menu{position:absolute;top:42px;right:0;background:#fff;border:1px solid var(--border);border-radius:4px;box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:220px;padding:6px 0;z-index:30;font-family:Inter,sans-serif}
  .menu .item{padding:8px 14px;font-size:13px;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:space-between}
  .menu .item:hover{background:#F4F3F3}
  .menu .item .chk{width:14px;height:14px;border:1px solid var(--muted);border-radius:2px;display:inline-flex;align-items:center;justify-content:center}
  .menu .item.sel .chk{background:var(--teal);border-color:var(--teal);color:#fff}
  .menu .sectlabel{padding:6px 14px;font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}

  /* toast */
  .toast{position:fixed;right:24px;bottom:24px;background:#0A6E5E;color:#fff;padding:12px 18px;border-radius:4px;font-size:13px;font-family:Inter,sans-serif;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:100}

  /* Expand animation */
  .expand-enter{max-height:0;opacity:0;overflow:hidden;transition:max-height .3s ease,opacity .3s}
  .expand-active{max-height:900px;opacity:1}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
